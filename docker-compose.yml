x-postgres-credentials: &postgres-credentials
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: warehouse

x-postgres-connection: &postgres-connection
  <<: *postgres-credentials
  POSTGRES_URL: jdbc:postgresql://postgres:5432/warehouse

services:
  # Kafka broker/controller (KRaft) used as the event streaming backbone for the assignment.
  kafka:
    image: apache/kafka:3.7.1
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list 1>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 15

  # Kafka UI for inspecting topics/messages locally during development and demos.
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8088:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  # Kafka bootstrap job to create the assignment topic before producers/consumers begin exchanging events.
  kafka-init:
    image: apache/kafka:3.7.1
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic events --partitions 1 --replication-factor 1"]

  # PostgreSQL simulating a data-warehouse-like analytics database for processed DATA/IMAGE events.
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      <<: *postgres-credentials
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d warehouse"]
      interval: 10s
      timeout: 5s
      retries: 15

  grafana:
    image: grafana/grafana-oss:11.0.0
    container_name: grafana
    ports:
      - "3031:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      postgres:
        condition: service_healthy

  # MinIO provides local S3-compatible object storage for IMAGE event outputs.
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 20

  # MinIO bootstrap job to create the images bucket required by the assignment pipeline; this is a one-shot init container and is expected to exit successfully.
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c", "mc alias set local http://minio:9000 minio minio123 && mc mb --ignore-existing local/images && mc anonymous set download local/images || true"]

  # Spring Boot API layer that validates UI requests and publishes JSON events to Kafka.
  backend:
    build:
      context: ./backend
    container_name: backend
    environment:
      - SERVER_PORT=8080
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - APP_KAFKA_TOPIC=events
      - APP_MINIO_ENDPOINT=http://minio:9000
      - APP_MINIO_ACCESS_KEY=minio
      - APP_MINIO_SECRET_KEY=minio123
      - APP_MINIO_BUCKET=images
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  # Flink JobManager providing the stream processing control plane for the assignment.
  flink-jobmanager:
    image: apache/flink:1.18-java17
    container_name: flink-jobmanager
    command: jobmanager
    ports:
      - "8081:8081"
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  # Flink TaskManager providing execution slots/workers for the streaming job.
  flink-taskmanager:
    image: apache/flink:1.18-java17
    container_name: flink-taskmanager
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
    depends_on:
      - flink-jobmanager

  # Flink job submitter for the Kafka->(MinIO/Postgres) pipeline; unlike minio-init it is not expected to exit immediately, and an early exit means job submission/startup failed.
  flink-job:
    build:
      context: ./flink
    container_name: flink-job
    environment:
      <<: *postgres-connection
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: events
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio123
      MINIO_BUCKET: images
    depends_on:
      flink-jobmanager:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command: ["/bin/bash", "-lc", "until curl -fsS http://flink-jobmanager:8081/overview >/dev/null; do echo 'waiting for flink-jobmanager...'; sleep 2; done; /opt/flink/bin/flink run -m flink-jobmanager:8081 -d -c com.memcyco.pipeline.StreamingJob /opt/job/app.jar && tail -f /dev/null"]

  # React UI (served via Nginx) used to submit IMAGE/DATA events to the backend API.
  ui:
    build:
      context: ./frontend
    container_name: ui
    ports:
      - "3030:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
  grafana_data:
